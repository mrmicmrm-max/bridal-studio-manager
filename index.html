<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Manager</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="https://accounts.google.com/gsi/client" async defer onload="if(window.onGsiReady) window.onGsiReady();"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@400;500;600&family=Poppins:wght@400;500;600;700&family=Jost:wght@400;500;600;700&display=swap');
:root{
  --bg:#FBF8F3; --surface:#FFFFFF; --border:#E7DFD0; --borderSoft:#F1EAE0;
  --text:#2E2A24; --textMuted:#948A79; --accent:#B08968; --accentDeep:#8C6B4C;
  --accentSoft:#EBDDC9; --rose:#C9A3A0; --success:#7C8B6F; --successSoft:#E7ECE1;
  --danger:#B4635C; --dangerSoft:#F5E3E1;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--bodyFontFamily,'Inter'),sans-serif;}
h1,h2,h3,.serif{font-family:var(--headingFontFamily,'Playfair Display'),serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
.wrap{display:flex;flex-wrap:wrap;gap:20px;padding:24px;max-width:1180px;margin:0 auto;}
.sidebar{width:200px;flex-shrink:0;}
.brand{font-size:22px;font-weight:600;}
.brand-sub{font-size:12px;color:var(--textMuted);margin-top:2px;}
nav{display:flex;flex-direction:column;gap:4px;margin-top:22px;}
nav button{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:none;
  background:transparent;color:var(--textMuted);font-weight:500;font-size:14px;cursor:pointer;text-align:left;font-family:inherit;}
nav button.active{background:var(--accentSoft);color:var(--accentDeep);font-weight:700;}
.main{flex:1;min-width:320px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.row{display:flex;justify-content:space-between;align-items:center;}
.row-head{margin-bottom:4px;}
.divider{margin:12px 0 18px;height:10px;}
h2.title{font-size:26px;margin:0;font-weight:600;}
.btn{font-family:inherit;font-size:13px;font-weight:600;padding:9px 16px;border-radius:7px;cursor:pointer;
  border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;}
.btn.outline{background:transparent;color:var(--accentDeep);border:1px solid var(--accent);}
.btn.ghost{background:transparent;color:var(--textMuted);padding:6px 8px;}
.btn.danger-ghost{background:transparent;color:var(--danger);padding:6px 8px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
label.field{display:block;margin-bottom:14px;}
.field-label{font-size:12px;font-weight:600;color:var(--textMuted);letter-spacing:.3px;display:block;margin-bottom:5px;}
input,select,textarea{width:100%;font-family:inherit;font-size:14px;padding:9px 11px;border-radius:7px;
  border:1px solid var(--border);background:#fff;color:var(--text);outline:none;}
textarea{resize:vertical;min-height:60px;}
.stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px;}
.stat{flex:1;min-width:140px;padding:18px;}
.stat-label{font-size:12px;color:var(--textMuted);font-weight:600;margin-bottom:8px;}
.stat-value{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:500;}
.job-card,.exp-card{padding:16px;margin-bottom:10px;}
.exp-card{padding:14px;display:flex;justify-content:space-between;align-items:center;}
.job-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--borderSoft);}
.chip{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;color:var(--textMuted);padding:0;font-family:inherit;}
.chip.paid{color:var(--success);}
.svc-row{display:flex;gap:8px;margin-bottom:8px;}
.dep-opt{flex:1;padding:8px 10px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--textMuted);}
.dep-opt.active{border-color:var(--accent);background:var(--accentSoft);color:var(--accentDeep);}
.modal-bg{position:fixed;inset:0;background:rgba(46,42,36,.4);display:flex;align-items:flex-start;justify-content:center;
  padding:40px 16px;overflow-y:auto;z-index:50;}
.modal{background:var(--surface);border-radius:12px;width:600px;max-width:100%;padding:24px;border:1px solid var(--border);}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.close-x{background:none;border:none;cursor:pointer;color:var(--textMuted);font-size:20px;}
.totals-bar{background:var(--bg);border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px;display:flex;justify-content:space-between;}
.hidden{display:none !important;}
.empty{padding:40px;text-align:center;color:var(--textMuted);}
.err{margin-top:16px;font-size:12px;color:var(--danger);}
.pending-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--borderSoft);font-size:14px;}
.svc-line{display:flex;gap:12px;font-size:12px;color:var(--textMuted);margin-top:6px;}
.meta-line{font-size:12px;color:var(--textMuted);display:flex;gap:12px;margin-top:4px;}
canvas{display:none;}
::placeholder{color:#c9c0b0;}
.sync-bar{margin-top:14px;padding:10px;border-radius:8px;background:var(--surface);border:1px solid var(--border);font-size:11px;}
.sync-status{color:var(--textMuted);display:flex;align-items:center;gap:5px;margin-top:6px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--textMuted);flex-shrink:0;}
.sync-dot.ok{background:var(--success);}
.sync-dot.busy{background:var(--accent);}
.sync-dot.err{background:var(--danger);}
.btn-google{width:100%;justify-content:center;font-size:12px;padding:8px 10px;}

/* ---------- Mobile responsiveness ---------- */
@media (max-width: 760px){
  .wrap{flex-direction:column;padding:14px;gap:14px;}
  .sidebar{width:100%;}
  nav{flex-direction:row;overflow-x:auto;gap:6px;margin-top:14px;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
  nav button{white-space:nowrap;flex-shrink:0;}
  .modal{width:100% !important;padding:16px;}
  .stat{min-width:calc(50% - 7px);}
  [style*="gap:14px"]{flex-direction:column;gap:0 !important;}
  [style*="width:220px"]{width:100% !important;}
  [style*="min-width:400px"]{min-width:0 !important;}
  .row-head{flex-wrap:wrap;gap:10px;}
  h2.title{font-size:22px;}
}
@media (max-width: 420px){
  .stat{min-width:100%;}
}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--text);color:var(--surface);
  padding:12px 16px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:100;max-width:90vw;}
.toast-undo{background:none;border:1px solid rgba(255,255,255,.4);color:inherit;border-radius:6px;padding:4px 10px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
</style>
</head>
<body>
<canvas id="invCanvas"></canvas>
<div class="wrap">
  <div class="sidebar">
    <div class="brand serif" id="brandName">Studio</div>
    <div class="brand-sub" id="brandSub">Studio Manager</div>
    <nav id="nav"></nav>
    <div id="syncBar" class="sync-bar"></div>
    <div class="err hidden" id="saveErr"></div>
  </div>
  <div class="main" id="main"></div>
</div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
// ---------- storage (localStorage, fully offline) ----------
const LS_KEYS = { jobs: 'bsm_jobs', expenses: 'bsm_expenses', settings: 'bsm_settings', invoiceBg: 'bsm_invoice_bg' };
function loadLS(key, fallback){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
function saveLS(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); return true; }catch(e){ return false; } }

const SERVICE_PRESETS = [
  "Standard Bridal Makeup & Hair Package (Up to 3 consecutive hours)",
  "Deluxe Bridal Makeup & Hair Package (Up to 7 consecutive hours)",
  "Extra Standby Time",
  "Groom Makeup & Hair",
  "Mother Makeup & Hair",
  "Bridesmaid Makeup & Hair",
  "Guest Makeup & Hair",
  "Mother Makeup Only",
  "Mother Hair Only",
  "Bridesmaid Makeup Only",
  "Bridesmaid Hair Only",
  "Guest Makeup Only",
  "Guest Hair Only",
  "Additional HMUA Travel Fee",
  "[Blank Item to fill in]",
];
const CUSTOM_SERVICE_LABEL = SERVICE_PRESETS[SERVICE_PRESETS.length - 1];
const JOB_TYPES = [
  {v:'PW', label:'PW · Pre-wedding'},
  {v:'TRIAL', label:'TRIAL · Trial'},
  {v:'WED', label:'WED · Wedding Day'},
  {v:'DWED', label:'DWED · Destination Wedding'},
  {v:'CUSTOM', label:'Custom · Enter your own'},
];
function jobTypeCode(job){
  if(job.jobType==='CUSTOM'){
    const c = (job.jobTypeCustom||'CUSTOM').trim().toUpperCase().replace(/[^A-Z0-9]+/g,'');
    return c || 'CUSTOM';
  }
  return job.jobType || 'WED';
}
function jobTypeBadge(job){
  if(job.jobType==='CUSTOM') return esc((job.jobTypeCustom||'Custom').toUpperCase());
  return esc(job.jobType || 'WED');
}
const EXPENSE_CATEGORIES = ["Makeup Supplies","Travel","Accommodation","Equipment","Training","Marketing","Other"];
const MONTHS_ZH = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const DEFAULT_INVOICE_POS = {
  invoiceDate: {x:300, y:340},
  invoiceNumber: {x:800, y:340},
  clientName: {x:300, y:420},
  clientTel: {x:800, y:420},
  locale: {x:1400, y:420},
  trialDate: {x:300, y:480},
  weddingDate: {x:800, y:480},
  shootingDate: {x:1400, y:480},
  serviceNameX: 300, serviceUnitCostX: 1350, serviceQtyX: 1550, serviceAmountX: 1750, serviceStartY: 650, serviceLineHeight: 46,
  subtotalValue: {x:1750, y:1050},
  depositValue: {x:1750, y:1100},
  balanceValue: {x:1750, y:1150},
  finalPaymentDueDate: {x:1750, y:1210},
  notes: {x:300, y:1650},
  termsConditions: {x:300, y:1780},
};

let state = {
  jobs: loadLS(LS_KEYS.jobs, []),
  expenses: loadLS(LS_KEYS.expenses, []),
  settings: Object.assign({
    appTitle: "Invoice Manager", themeColor: "#B08968",
    headingFont: "Playfair Display", bodyFont: "Inter",
    bgColor: "#FBF8F3", surfaceColor: "#FFFFFF", uiTextColor: "#2E2A24",
    businessName:"", artistName:"", currencySymbol:"£", paymentDetails:"", accentHex:"#B08968",
    invoiceBg: null, invoicePos: JSON.parse(JSON.stringify(DEFAULT_INVOICE_POS)),
    invoiceFontSize: 30, invoiceTextColor: "#1a1a1a", invoiceFontFamily: "Inter",
    termsAndConditions: "", invoiceTcFontSize: 15, invoiceTcMaxWidth: 1500,
    tcTemplates: [],
    googleClientId: "",
  }, loadLS(LS_KEYS.settings, {})),
  tab: 'dashboard',
  year: new Date().getFullYear(),
  invoiceJobId: null,
  jobSortBy: 'date-desc',
};
if(!state.settings.invoicePos) state.settings.invoicePos = JSON.parse(JSON.stringify(DEFAULT_INVOICE_POS));
else state.settings.invoicePos = Object.assign(JSON.parse(JSON.stringify(DEFAULT_INVOICE_POS)), state.settings.invoicePos);
// the invoice background image is stored in its own storage slot, separate from the rest of
// settings, so a large image can never block ordinary settings saves (like the invoice font)
// from succeeding due to browser storage limits.
state.settings.invoiceBg = loadLS(LS_KEYS.invoiceBg, null);
// migrate legacy single T&C text into templates list (one-time)
if((!state.settings.tcTemplates || state.settings.tcTemplates.length===0) && state.settings.termsAndConditions){
  state.settings.tcTemplates = [{ id: 'tpl_'+Date.now(), name: 'Default Terms', text: state.settings.termsAndConditions }];
  saveLS(LS_KEYS.settings, settingsWithoutBg());
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s){ const d=document.createElement('div'); d.textContent = s==null? '' : s; return d.innerHTML; }

// ---------- dynamic UI theme ----------
function shadeColor(hex, percent){
  hex = (hex||'#B08968').replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  if(!/^[0-9a-fA-F]{6}$/.test(hex)) hex = 'B08968';
  let r=parseInt(hex.substring(0,2),16), g=parseInt(hex.substring(2,4),16), b=parseInt(hex.substring(4,6),16);
  const mix = (c)=> percent>0 ? Math.round(c + (255-c)*percent) : Math.round(c + c*percent);
  r=Math.min(255,Math.max(0,mix(r))); g=Math.min(255,Math.max(0,mix(g))); b=Math.min(255,Math.max(0,mix(b)));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function applyTheme(){
  const s = state.settings;
  const root = document.documentElement.style;
  const accent = s.themeColor || '#B08968';
  root.setProperty('--accent', accent);
  root.setProperty('--accentDeep', shadeColor(accent, -0.28));
  root.setProperty('--accentSoft', shadeColor(accent, 0.78));
  const bg = s.bgColor || '#FBF8F3';
  const surface = s.surfaceColor || '#FFFFFF';
  const text = s.uiTextColor || '#2E2A24';
  root.setProperty('--bg', bg);
  root.setProperty('--surface', surface);
  root.setProperty('--text', text);
  root.setProperty('--textMuted', shadeColor(text, 0.45));
  root.setProperty('--border', shadeColor(bg, -0.1));
  root.setProperty('--borderSoft', shadeColor(bg, -0.04));
  root.setProperty('--headingFontFamily', "'" + (s.headingFont || 'Playfair Display') + "'");
  root.setProperty('--bodyFontFamily', "'" + (s.bodyFont || 'Inter') + "'");
}

const THEME_PRESETS = [
  { name:'Blush Ivory', bg:'#FBF8F3', surface:'#FFFFFF', text:'#2E2A24', accent:'#B08968' },
  { name:'Sage & Cream', bg:'#F6F5EF', surface:'#FFFFFF', text:'#33362E', accent:'#8A9A7E' },
  { name:'Dusty Rose', bg:'#FBF4F3', surface:'#FFFFFF', text:'#362B2C', accent:'#C98A8F' },
  { name:'Classic Mono', bg:'#FAFAFA', surface:'#FFFFFF', text:'#1A1A1A', accent:'#4A4A4A' },
  { name:'Charcoal Noir', bg:'#1E1C1A', surface:'#2A2724', text:'#F2EDE6', accent:'#C9A15A' },
  { name:'Powder Blue', bg:'#F4F7FA', surface:'#FFFFFF', text:'#242C33', accent:'#6E8FA8' },
];
function money(n, sym){ const v = Number(n)||0; return (sym||'£') + v.toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
const MONTH_ABBR = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function formatDate(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr.length<=10 ? dateStr + 'T00:00:00' : dateStr);
  if(isNaN(d.getTime())) return dateStr;
  return `${d.getDate()} ${MONTH_ABBR[d.getMonth()]} ${d.getFullYear()}`;
}
function fileDateStr(d){ return (d||'').replace(/-/g,''); }
function fileClientStr(name){ return (name||'Client').split(/\s+/).filter(Boolean).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(''); }
function invoiceFilename(job){ return `INV-${jobTypeCode(job)}-${fileDateStr(job.date)}-${fileClientStr(job.clientName)}.jpg`; }
function jobTotal(j){ const s=(j.services||[]).reduce((a,x)=>a+(Number(x.unitCost)||0)*(Number(x.qty)||1),0); return s+(Number(j.travelCost)||0)+(Number(j.accommodationCost)||0); }
function jobDeposit(j){ const t=jobTotal(j); if(j.depositType==='full') return t; if(j.depositType==='custom') return Number(j.depositAmountCustom)||0; return Math.round(t*0.5*100)/100; }
function jobBalance(j){ return Math.round((jobTotal(j)-jobDeposit(j))*100)/100; }
function paymentEvents(j){
  // returns list of {amount, date} for cash actually received, falling back to job date if no explicit payment date recorded (legacy data)
  const events = [];
  if(j.depositPaid) events.push({ amount: jobDeposit(j), date: j.depositPaidDate || j.date });
  if(j.depositType !== 'full' && j.balancePaid) events.push({ amount: jobBalance(j), date: j.balancePaidDate || j.date });
  return events;
}

function settingsWithoutBg(){
  const { invoiceBg, ...rest } = state.settings;
  return rest;
}
function persistJobs(){ const ok = saveLS(LS_KEYS.jobs, state.jobs); scheduleDriveSave(); return ok; }
function persistExpenses(){ const ok = saveLS(LS_KEYS.expenses, state.expenses); scheduleDriveSave(); return ok; }
function persistSettings(){ const ok = saveLS(LS_KEYS.settings, settingsWithoutBg()); scheduleDriveSave(); return ok; }
function persistInvoiceBg(){ return saveLS(LS_KEYS.invoiceBg, state.settings.invoiceBg || null); }

function showErr(msg){
  const el = document.getElementById('saveErr');
  if(msg){ el.textContent = msg; el.classList.remove('hidden'); }
  else { el.classList.add('hidden'); }
}

// ---------- Google Drive sync ----------
const DRIVE_FILENAME = 'bridal_studio_manager_data.json';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
let gAccessToken = null;
let gTokenClient = null;
let gDriveFileId = null;
let gUserEmail = '';
let gSyncStatus = { state: 'signedout', msg: 'Not connected to Google Drive' }; // signedout | ready | busy | error
let gSaveTimer = null;

function setSyncStatus(state, msg){ gSyncStatus = {state, msg}; renderSyncBar(); }

function renderSyncBar(){
  const el = document.getElementById('syncBar');
  if(!el) return;
  const dotClass = gSyncStatus.state==='ready' ? 'ok' : gSyncStatus.state==='busy' ? 'busy' : gSyncStatus.state==='error' ? 'err' : '';
  if(!gAccessToken){
    el.innerHTML = `
      <div style="font-weight:700;color:var(--textMuted);margin-bottom:4px;">☁ Google Drive</div>
      ${state.settings.googleClientId
        ? `<button class="btn outline btn-google" id="gSignInBtn">Sign in with Google</button>`
        : `<div style="color:var(--textMuted);">Not configured — set up in Settings</div>`}
      <div class="sync-status"><span class="sync-dot"></span>Not connected</div>`;
  } else {
    el.innerHTML = `
      <div style="font-weight:700;color:var(--textMuted);margin-bottom:4px;">☁ Google Drive</div>
      <div style="color:var(--text);word-break:break-all;">${esc(gUserEmail||'Signed in')}</div>
      <div class="sync-status"><span class="sync-dot ${dotClass}"></span>${esc(gSyncStatus.msg)}</div>
      <button class="btn ghost" id="gSignOutBtn" style="padding:4px 0;font-size:11px;">Sign out</button>`;
  }
  const inBtn = document.getElementById('gSignInBtn'); if(inBtn) inBtn.onclick = googleSignIn;
  const outBtn = document.getElementById('gSignOutBtn'); if(outBtn) outBtn.onclick = googleSignOut;
}

const GSIGNIN_FLAG_KEY = 'bsm_google_was_signedin';
let gSilentAttempt = false;

function ensureTokenClient(){
  if(gTokenClient) return true;
  if(!window.google || !window.google.accounts || !state.settings.googleClientId) return false;
  gTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: state.settings.googleClientId,
    scope: DRIVE_SCOPE,
    callback: onGoogleTokenResponse,
  });
  return true;
}

function googleSignIn(){
  if(!ensureTokenClient()){ showErr('Google Client ID not set. Please add it in Settings.'); return; }
  gSilentAttempt = false;
  const hasSignedBefore = localStorage.getItem(GSIGNIN_FLAG_KEY) === '1';
  gTokenClient.requestAccessToken({ prompt: hasSignedBefore ? '' : 'consent' });
}

function googleSignOut(){
  if(gAccessToken && window.google) google.accounts.oauth2.revoke(gAccessToken, ()=>{});
  gAccessToken = null; gDriveFileId = null; gUserEmail = '';
  localStorage.removeItem(GSIGNIN_FLAG_KEY);
  setSyncStatus('signedout', 'Not connected to Google Drive');
}

async function onGoogleTokenResponse(resp){
  if(resp.error){
    const wasSilent = gSilentAttempt;
    gSilentAttempt = false;
    if(wasSilent){ return; } // quietly stay signed out, no error shown for background attempts
    setSyncStatus('error', 'Sign-in failed: ' + resp.error);
    return;
  }
  gSilentAttempt = false;
  gAccessToken = resp.access_token;
  localStorage.setItem(GSIGNIN_FLAG_KEY, '1');
  setSyncStatus('busy', 'Loading data from Google Drive...');
  try{
    const infoRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + gAccessToken } });
    if(infoRes.ok){ const info = await infoRes.json(); gUserEmail = info.email || ''; }
  }catch(e){}
  await loadFromDrive();
}

function attemptSilentGoogleSignIn(){
  if(!state.settings.googleClientId) return;
  if(localStorage.getItem(GSIGNIN_FLAG_KEY) !== '1') return;
  if(!ensureTokenClient()) return;
  gSilentAttempt = true;
  gTokenClient.requestAccessToken({ prompt: '' });
}
window.onGsiReady = function(){ attemptSilentGoogleSignIn(); };

async function driveFindFile(){
  const q = encodeURIComponent(`name='${DRIVE_FILENAME}' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)`, {
    headers: { Authorization: 'Bearer ' + gAccessToken }
  });
  if(!res.ok) throw new Error('Failed to search Drive files (' + res.status + ')');
  const data = await res.json();
  gDriveFileId = (data.files && data.files.length) ? data.files[0].id : null;
  return gDriveFileId;
}

async function driveCreateFile(contentStr){
  const boundary = 'bsm_boundary_' + Date.now();
  const metadata = { name: DRIVE_FILENAME, mimeType: 'application/json' };
  const body =
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${contentStr}\r\n` +
    `--${boundary}--`;
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + gAccessToken, 'Content-Type': `multipart/related; boundary="${boundary}"` },
    body,
  });
  if(!res.ok) throw new Error('Failed to create Drive file (' + res.status + ')');
  const data = await res.json();
  gDriveFileId = data.id;
}

async function driveUpdateFile(contentStr){
  const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gDriveFileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + gAccessToken, 'Content-Type': 'application/json' },
    body: contentStr,
  });
  if(!res.ok) throw new Error('Failed to update Drive file (' + res.status + ')');
}

async function driveReadFile(){
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${gDriveFileId}?alt=media`, {
    headers: { Authorization: 'Bearer ' + gAccessToken }
  });
  if(!res.ok) throw new Error('Failed to read Drive file (' + res.status + ')');
  return await res.text();
}

async function loadFromDrive(){
  try{
    await driveFindFile();
    if(gDriveFileId){
      const text = await driveReadFile();
      const data = JSON.parse(text);
      if(data.jobs) state.jobs = data.jobs;
      if(data.expenses) state.expenses = data.expenses;
      if(data.settings) state.settings = Object.assign({}, state.settings, data.settings);
      saveLS(LS_KEYS.jobs, state.jobs); saveLS(LS_KEYS.expenses, state.expenses);
      saveLS(LS_KEYS.settings, settingsWithoutBg()); saveLS(LS_KEYS.invoiceBg, state.settings.invoiceBg || null);
      setSyncStatus('ready', 'Synced ' + new Date().toLocaleTimeString('en-GB').slice(0,5));
      render();
    } else {
      await saveToDrive(true);
    }
  }catch(e){
    setSyncStatus('error', e.message || 'Load failed');
  }
}

function scheduleDriveSave(){
  if(!gAccessToken) return;
  clearTimeout(gSaveTimer);
  gSaveTimer = setTimeout(()=> saveToDrive(false), 1500);
}

async function saveToDrive(isInitial){
  if(!gAccessToken) return;
  setSyncStatus('busy', 'Syncing...');
  try{
    const payload = JSON.stringify({ jobs: state.jobs, expenses: state.expenses, settings: state.settings });
    if(!gDriveFileId) await driveCreateFile(payload);
    else await driveUpdateFile(payload);
    setSyncStatus('ready', 'Synced ' + new Date().toLocaleTimeString('en-GB').slice(0,5));
    if(isInitial) render();
  }catch(e){
    setSyncStatus('error', e.message || 'Sync failed');
  }
}

// ---------- dashboard ----------
function renderDashboard(){
  const liveJobs = state.jobs.filter(j=>!j.trashed);
  const years = Array.from(new Set([
    ...liveJobs.flatMap(j=>paymentEvents(j).map(e=>new Date(e.date).getFullYear())),
    ...state.expenses.map(e=>new Date(e.date).getFullYear()),
    new Date().getFullYear()
  ])).sort((a,b)=>b-a);
  const allPayments = liveJobs.flatMap(j=>paymentEvents(j));
  const yearPayments = allPayments.filter(e=>new Date(e.date).getFullYear()===state.year);
  const yearExpenses = state.expenses.filter(e=>new Date(e.date).getFullYear()===state.year);
  const totalIncome = yearPayments.reduce((s,e)=>s+e.amount,0);
  const totalExpense = yearExpenses.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const pendingDeposit = liveJobs.filter(j=>!j.depositPaid);
  const pendingBalance = liveJobs.filter(j=>j.depositType!=='full' && !j.balancePaid);
  const sym = state.settings.currencySymbol;

  const chartData = MONTHS_ZH.map((m,i)=>{
    const inc = yearPayments.filter(e=>new Date(e.date).getMonth()===i).reduce((s,e)=>s+e.amount,0);
    const exp = yearExpenses.filter(e=>new Date(e.date).getMonth()===i).reduce((s,e)=>s+(Number(e.amount)||0),0);
    return {m, inc, exp};
  });
  const maxVal = Math.max(1, ...chartData.map(d=>Math.max(d.inc,d.exp)));
  const chartW = 720, chartH = 220, barGroupW = chartW/12;
  let bars = '';
  chartData.forEach((d,i)=>{
    const x = i*barGroupW;
    const incH = (d.inc/maxVal)*(chartH-30);
    const expH = (d.exp/maxVal)*(chartH-30);
    bars += `<rect x="${x+6}" y="${chartH-30-incH}" width="${barGroupW/2-8}" height="${incH}" fill="var(--accent)" rx="2"/>`;
    bars += `<rect x="${x+barGroupW/2+2}" y="${chartH-30-expH}" width="${barGroupW/2-8}" height="${expH}" fill="var(--rose)" rx="2"/>`;
    bars += `<text x="${x+barGroupW/2}" y="${chartH-10}" font-size="10" fill="var(--textMuted)" text-anchor="middle" font-family="Inter">${d.m}</text>`;
  });

  let pendingHtml = '';
  if(pendingDeposit.length || pendingBalance.length){
    const items = [...pendingDeposit.map(j=>({j,type:'Deposit'})), ...pendingBalance.map(j=>({j,type:'Balance'}))];
    pendingHtml = `<div class="card" style="margin-top:20px;">
      <div style="font-size:13px;font-weight:700;color:var(--textMuted);margin-bottom:10px;">Payments to Follow Up</div>
      ${items.map(({j,type})=>`<div class="pending-item"><span>${esc((j.clientName||'Unnamed Client').toUpperCase())} <span style="color:var(--textMuted);font-size:12px;">(${formatDate(j.date)})</span></span><span style="color:var(--danger);font-weight:600;">${type} outstanding</span></div>`).join('')}
    </div>`;
  }

  return `
    <div class="row row-head"><h2 class="title">Overview</h2>
      <select id="yearSel">${years.map(y=>`<option value="${y}" ${y===state.year?'selected':''}>${y}</option>`).join('')}</select>
    </div>
    ${laceDivider()}
    <div class="stat-row">
      <div class="card stat"><div class="stat-label">Cash Received (Year)</div><div class="stat-value" style="color:var(--success);">${money(totalIncome,sym)}</div></div>
      <div class="card stat"><div class="stat-label">Annual Expenses</div><div class="stat-value" style="color:var(--danger);">${money(totalExpense,sym)}</div></div>
      <div class="card stat"><div class="stat-label">Net Cash</div><div class="stat-value">${money(totalIncome-totalExpense,sym)}</div></div>
      <div class="card stat"><div class="stat-label">Unpaid Deposits</div><div class="stat-value">${pendingDeposit.length}</div></div>
      <div class="card stat"><div class="stat-label">Unpaid Balances</div><div class="stat-value">${pendingBalance.length}</div></div>
    </div>
    <div class="card">
      <div style="font-size:13px;font-weight:700;color:var(--textMuted);margin-bottom:12px;">Monthly Cash In vs Expenses · ${state.year}　<span style="color:var(--accent);">■</span> Income　<span style="color:var(--rose);">■</span> Expenses</div>
      <svg width="100%" viewBox="0 0 ${chartW} ${chartH}">${bars}</svg>
    </div>
    <p style="font-size:11px;color:var(--textMuted);margin-top:8px;">* "Cash received" is calculated from the actual deposit / balance payment dates. If a job's deposit and balance are received in different years, each portion is counted in its respective year.</p>
    ${pendingHtml}
  `;
}

const JOB_SORT_OPTIONS = [
  { v:'date-desc', label:'Date (Newest First)' },
  { v:'date-asc', label:'Date (Oldest First)' },
  { v:'price-desc', label:'Total (High to Low)' },
  { v:'price-asc', label:'Total (Low to High)' },
  { v:'status', label:'Payment Status (Unpaid First)' },
];

function sortJobs(jobs, sortBy){
  const arr = [...jobs];
  const statusRank = (j)=>{
    if(!j.depositPaid) return 0;
    if(j.depositType!=='full' && !j.balancePaid) return 1;
    return 2;
  };
  if(sortBy==='date-asc') arr.sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:0);
  else if(sortBy==='price-desc') arr.sort((a,b)=> jobTotal(b)-jobTotal(a));
  else if(sortBy==='price-asc') arr.sort((a,b)=> jobTotal(a)-jobTotal(b));
  else if(sortBy==='status') arr.sort((a,b)=> statusRank(a)-statusRank(b) || (a.date<b.date?1:-1));
  else arr.sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0); // date-desc default
  return arr;
}

// ---------- toast / undo ----------
let toastTimer = null;
function showToast(message, undoFn){
  const root = document.getElementById('toastRoot');
  const tid = 'toast_' + Date.now();
  root.innerHTML = `<div class="toast" id="${tid}"><span>${esc(message)}</span>${undoFn ? `<button class="toast-undo" id="${tid}_undo">Undo</button>` : ''}</div>`;
  if(undoFn){
    document.getElementById(tid + '_undo').onclick = ()=>{ undoFn(); root.innerHTML = ''; clearTimeout(toastTimer); };
  }
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ root.innerHTML = ''; }, 6000);
}

function openTrashModal(){
  const sym = state.settings.currencySymbol;
  const trashed = state.jobs.filter(j=>j.trashed).sort((a,b)=> (b.trashedAt||'').localeCompare(a.trashedAt||''));
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `<div class="modal-bg"><div class="modal" style="width:620px;">
    <div class="modal-head"><h3 class="serif" style="font-size:20px;margin:0;">Trash (${trashed.length})</h3><button class="close-x" id="closeTrashModal">✕</button></div>
    <p style="font-size:13px;color:var(--textMuted);margin-top:-8px;margin-bottom:14px;">Restore a job, or delete it permanently. Permanent deletion cannot be undone.</p>
    ${trashed.length===0 ? `<div class="card empty">Trash is empty.</div>` : trashed.map(j=>`
      <div class="card" style="padding:12px;margin-bottom:8px;background:var(--bg);">
        <div class="row" style="align-items:flex-start;">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:14px;">${esc((j.clientName||'Unnamed Client').toUpperCase())}</div>
            <div style="font-size:12px;color:var(--textMuted);margin-top:2px;">${formatDate(j.date)} · ${money(jobTotal(j), sym)}</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;">
            <button class="btn ghost" data-action="restore-job" data-id="${j.id}">Restore</button>
            <button class="btn danger-ghost" data-action="purge-job" data-id="${j.id}">Delete Forever</button>
          </div>
        </div>
      </div>`).join('')}
  </div></div>`;
  document.getElementById('closeTrashModal').onclick = closeModal;
  modal.querySelectorAll('[data-action="restore-job"]').forEach(b=> b.onclick = ()=>{
    const j = state.jobs.find(x=>x.id===b.dataset.id);
    if(j){ j.trashed = false; j.trashedAt = ''; persistJobs(); }
    openTrashModal();
    render();
  });
  modal.querySelectorAll('[data-action="purge-job"]').forEach(b=> b.onclick = ()=>{
    const j = state.jobs.find(x=>x.id===b.dataset.id);

// ---------- invoice canvas generation ----------
function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  const words = String(text).split(' ');
  let line = '', yy = y;
  words.forEach(w=>{
    const test = line + w + ' ';
    if(ctx.measureText(test).width > maxWidth && line){ ctx.fillText(line, x, yy); line = w + ' '; yy += lineHeight; }
    else line = test;
  });
  ctx.fillText(line, x, yy);
}

function generateInvoice(job){
  if(state.settings.invoiceBg){ generateInvoiceCustom(job); return; }
  generateInvoiceBuiltIn(job);
}

function resolveTcText(job){
  const list = state.settings.tcTemplates || [];
  if(!list.length) return '';
  const found = list.find(t=>t.id===job.tcTemplateId);
  return found ? found.text : '';
}

function drawInvoiceOverlay(ctx, job, opts){
  opts = opts || {};
  const sym = state.settings.currencySymbol || '£';
  const pos = state.settings.invoicePos || DEFAULT_INVOICE_POS;
  const fs = state.settings.invoiceFontSize || 30;
  const color = state.settings.invoiceTextColor || '#1a1a1a';
  const fam = state.settings.invoiceFontFamily || 'Inter';
  ctx.fillStyle = color;
  ctx.textAlign = 'left';
  ctx.font = `500 ${fs}px '${fam}'`;

  const fmtDate = (d)=> formatDate(d);
  if(pos.invoiceDate) ctx.fillText(formatDate(new Date().toISOString().slice(0,10)), pos.invoiceDate.x, pos.invoiceDate.y);
  if(pos.invoiceNumber) ctx.fillText(job.invoiceNumber || `INV-${fileDateStr(job.date)}`, pos.invoiceNumber.x, pos.invoiceNumber.y);
  ctx.fillText((job.clientName || '').toUpperCase(), pos.clientName.x, pos.clientName.y);
  if(pos.clientTel) ctx.fillText(job.clientTel || '', pos.clientTel.x, pos.clientTel.y);
  wrapText(ctx, job.locale || '', pos.locale.x, pos.locale.y, 500, fs+8);
  if(pos.trialDate) ctx.fillText(fmtDate(job.trialDate), pos.trialDate.x, pos.trialDate.y);
  if(pos.weddingDate) ctx.fillText(fmtDate(job.weddingDate), pos.weddingDate.x, pos.weddingDate.y);
  if(pos.shootingDate) ctx.fillText(fmtDate(job.shootingDate), pos.shootingDate.x, pos.shootingDate.y);

  let sy = pos.serviceStartY;
  const lines = [...(job.services||[]).map(s=>({name:(s.name||'').toUpperCase(), unitCost:s.unitCost, qty:s.qty||1}))];
  if(Number(job.travelCost)>0) lines.push({name:'TRAVEL', unitCost:job.travelCost, qty:1});
  if(Number(job.accommodationCost)>0) lines.push({name:'ACCOMMODATION', unitCost:job.accommodationCost, qty:1});
  lines.forEach(ln=>{
    const sub = (Number(ln.unitCost)||0) * (Number(ln.qty)||1);
    ctx.font = `500 ${fs}px '${fam}'`;
    ctx.textAlign = 'left';
    ctx.fillText(ln.name, pos.serviceNameX, sy);
    ctx.textAlign = 'right';
    if(pos.serviceUnitCostX) ctx.fillText(money(ln.unitCost, sym), pos.serviceUnitCostX, sy);
    if(pos.serviceQtyX){ ctx.textAlign = 'center'; ctx.fillText(String(ln.qty||1), pos.serviceQtyX, sy); }
    ctx.textAlign = 'right';
    ctx.fillText(money(sub, sym), pos.serviceAmountX, sy);
    sy += pos.serviceLineHeight;
  });

  const total = jobTotal(job), dep = jobDeposit(job), bal = jobBalance(job);
  ctx.textAlign = 'right';
  ctx.font = `600 ${fs}px '${fam}'`;
  ctx.fillText(money(total, sym), pos.subtotalValue.x, pos.subtotalValue.y);
  ctx.fillText(money(dep, sym), pos.depositValue.x, pos.depositValue.y);
  if(job.depositType !== 'full') ctx.fillText(money(bal, sym), pos.balanceValue.x, pos.balanceValue.y);
  if(pos.finalPaymentDueDate && job.finalPaymentDueDate){
    ctx.font = `500 ${fs}px '${fam}'`;
    ctx.fillText(fmtDate(job.finalPaymentDueDate), pos.finalPaymentDueDate.x, pos.finalPaymentDueDate.y);
  }
  ctx.textAlign = 'left';
  if(!opts.skipNotes && state.settings.paymentDetails){
    ctx.font = `400 ${fs-8}px '${fam}'`;
    wrapText(ctx, state.settings.paymentDetails, pos.notes.x, pos.notes.y, 900, fs);
  }
  if(!opts.skipTerms && pos.termsConditions){
    const tcText = resolveTcText(job);
    if(tcText){
      const tcFs = state.settings.invoiceTcFontSize || 15;
      const tcW = state.settings.invoiceTcMaxWidth || 1500;
      ctx.font = `400 ${tcFs}px '${fam}'`;
      ctx.fillStyle = state.settings.invoiceTextColor || '#666';
      wrapText(ctx, tcText, pos.termsConditions.x, pos.termsConditions.y, tcW, tcFs+8);
    }
  }
}

function generateInvoiceCustom(job){
  const img = new Image();
  img.onload = ()=>{
    const canvas = document.getElementById('invCanvas');
    canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    drawInvoiceOverlay(ctx, job);

    const a = document.createElement('a');

  img.src = state.settings.invoiceBg;
}

// ---------- calibration modal ----------
const CAL_FIELDS = [
  {key:'invoiceDate', label:'Invoice Date', type:'point'},
  {key:'invoiceNumber', label:'Invoice Number', type:'point'},
  {key:'clientName', label:'Client Name', type:'point'},
  {key:'clientTel', label:'Client Phone', type:'point'},
  {key:'locale', label:'Location', type:'point'},
  {key:'trialDate', label:'Trial Date', type:'point'},
  {key:'weddingDate', label:'Wedding Date', type:'point'},
  {key:'shootingDate', label:'Shoot Date', type:'point'},
  {key:'service', label:'Service Name Start (Left)', type:'servicePoint'},
  {key:'serviceUnitCost', label:'Unit Cost Column', type:'serviceUnitCostPoint'},
  {key:'serviceQty', label:'Qty Column', type:'serviceQtyPoint'},
  {key:'serviceAmount', label:'Line Subtotal (Right)', type:'serviceAmountPoint'},
  {key:'subtotalValue', label:'Total', type:'point'},
  {key:'depositValue', label:'Deposit Amount', type:'point'},
  {key:'balanceValue', label:'Balance Amount', type:'point'},
  {key:'finalPaymentDueDate', label:'Final Payment Due Date', type:'point'},
  {key:'notes', label:'Notes / Payment Details', type:'point'},
  {key:'termsConditions', label:'Terms &amp; Conditions', type:'point'},
];

function openCalibrationModal(){
  const sampleJob = state.jobs[0] || {
    id:'sample123456', jobType:'WED', clientName:'Jane Smith', clientTel:'+44 7700 123456',
    date: new Date().toISOString().slice(0,10), invoiceNumber:'INV-20260701',
    locale:'The Ritz, London', trialDate:'2026-02-01', weddingDate:'2026-07-01', shootingDate:'',
    finalPaymentDueDate:'2026-06-17',
    services:[{name:'Deluxe Bridal Makeup & Hair Package (Up to 7 consecutive hours)',unitCost:900,qty:1},{name:'Bridesmaid Makeup & Hair',unitCost:100,qty:2}],
    travelCost:30, accommodationCost:0, depositType:'50%', depositPaid:true, balancePaid:false,
    tcTemplateId: (state.settings.tcTemplates && state.settings.tcTemplates[0]) ? state.settings.tcTemplates[0].id : '',
  };
  let activeField = CAL_FIELDS[0].key;
  const modal = document.getElementById('modalRoot');
  modal.innerHTML = `<div class="modal-bg"><div class="modal" style="width:900px;">
    <div class="modal-head"><h3 class="serif" style="font-size:20px;margin:0;">Calibrate Text Positions</h3><button class="close-x" id="closeCalModal">✕</button></div>
    <p style="font-size:13px;color:var(--textMuted);margin-top:-8px;">Select a field on the left, then click on the image where you want it placed. Calibrate each field one at a time, and save whenever you're ready.</p>
    <div style="display:flex;gap:16px;flex-wrap:wrap;">
      <div style="width:220px;flex-shrink:0;">
        <div id="calFieldList"></div>
        <div style="margin-top:16px;">
          <label class="field"><span class="field-label">Font Size</span><input type="number" id="calFontSize" value="${state.settings.invoiceFontSize||30}"></label>
          <label class="field"><span class="field-label">Text Color</span><input type="text" id="calTextColor" value="${state.settings.invoiceTextColor||'#1a1a1a'}"></label>
          <label class="field"><span class="field-label">Service Row Spacing</span><input type="number" id="calLineHeight" value="${state.settings.invoicePos.serviceLineHeight}"></label>
          <label class="field"><span class="field-label">T&amp;C Font Size</span><input type="number" id="calTcFontSize" value="${state.settings.invoiceTcFontSize||15}"></label>
          <label class="field"><span class="field-label">T&amp;C Text Width</span><input type="number" id="calTcWidth" value="${state.settings.invoiceTcMaxWidth||1500}"></label>
        </div>
      </div>
      <div style="flex:1;min-width:400px;overflow:auto;max-height:60vh;border:1px solid var(--border);border-radius:8px;">
        <canvas id="calCanvas" style="width:100%;display:block;cursor:crosshair;"></canvas>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
      <button class="btn ghost" id="cancelCalBtn">Cancel</button>
      <button class="btn" id="saveCalBtn">✓ Save Positions</button>
    </div>
  </div></div>`;

  const fieldListEl = document.getElementById('calFieldList');
  function renderFieldList(){
    fieldListEl.innerHTML = CAL_FIELDS.map(f=>`<button class="dep-opt" style="display:block;width:100%;margin-bottom:6px;text-align:left;${f.key===activeField?'border-color:var(--accent);background:var(--accentSoft);color:var(--accentDeep);':''}" data-fk="${f.key}">${f.label}</button>`).join('');
    fieldListEl.querySelectorAll('button').forEach(b=> b.onclick = ()=>{ activeField = b.dataset.fk; renderFieldList(); });
  }
  renderFieldList();

  const canvas = document.getElementById('calCanvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = ()=>{
    canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
    redrawPreview();
  };
  img.src = state.settings.invoiceBg;

  function redrawPreview(){
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    drawInvoiceOverlay(ctx, sampleJob);
    // draw markers
    const pos = state.settings.invoicePos;
    ctx.save();
    ctx.strokeStyle = '#B4635C'; ctx.lineWidth = 2;
    const markers = [
      pos.invoiceDate, pos.invoiceNumber, pos.clientName, pos.clientTel, pos.locale,
      pos.trialDate, pos.weddingDate, pos.shootingDate,
      pos.subtotalValue, pos.depositValue, pos.balanceValue, pos.finalPaymentDueDate,
      pos.notes, pos.termsConditions,
      {x:pos.serviceNameX, y:pos.serviceStartY}, {x:pos.serviceUnitCostX, y:pos.serviceStartY},
      {x:pos.serviceQtyX, y:pos.serviceStartY}, {x:pos.serviceAmountX, y:pos.serviceStartY},
    ].filter(Boolean);
    markers.forEach(m=>{ ctx.beginPath(); ctx.arc(m.x, m.y, 6, 0, Math.PI*2); ctx.stroke(); });
    ctx.restore();
  }

  canvas.onclick = (e)=>{
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = Math.round((e.clientX - rect.left) * scaleX);
    const y = Math.round((e.clientY - rect.top) * scaleY);
    const pos = state.settings.invoicePos;
    const field = CAL_FIELDS.find(f=>f.key===activeField);
    if(field.type === 'point') pos[activeField] = {x, y};
    else if(field.type === 'servicePoint'){ pos.serviceNameX = x; pos.serviceStartY = y; }
    else if(field.type === 'serviceUnitCostPoint'){ pos.serviceUnitCostX = x; }
    else if(field.type === 'serviceQtyPoint'){ pos.serviceQtyX = x; }
    else if(field.type === 'serviceAmountPoint'){ pos.serviceAmountX = x; }
    redrawPreview();
  };

  document.getElementById('closeCalModal').onclick = closeModal;
  document.getElementById('cancelCalBtn').onclick = closeModal;
  ['calFontSize','calTextColor','calLineHeight','calTcFontSize','calTcWidth'].forEach(id=>{
    document.getElementById(id).addEventListener('input', ()=>{
      state.settings.invoiceFontSize = Number(document.getElementById('calFontSize').value) || 30;
      state.settings.invoiceTextColor = document.getElementById('calTextColor').value || '#1a1a1a';
      state.settings.invoicePos.serviceLineHeight = Number(document.getElementById('calLineHeight').value) || 46;
      state.settings.invoiceTcFontSize = Number(document.getElementById('calTcFontSize').value) || 15;
      state.settings.invoiceTcMaxWidth = Number(document.getElementById('calTcWidth').value) || 1500;
      redrawPreview();
    });
  });
  document.getElementById('saveCalBtn').onclick = ()=>{
    const ok = persistSettings();
    showErr(ok===false ? 'Save failed, please try again' : '');
    closeModal();
  };
}

function generateInvoiceBuiltIn(job){
  const W=1000, H=1414;
  const canvas = document.getElementById('invCanvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const accent = state.settings.accentHex || '#B08968';
  const sym = state.settings.currencySymbol || '£';

  ctx.fillStyle = '#FBF8F3'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#E7DFD0'; ctx.lineWidth = 1; ctx.strokeRect(40,40,W-80,H-80);

  function drawScallop(y){
    ctx.strokeStyle = accent; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(80,y); ctx.lineTo(W-80,y); ctx.stroke();
    ctx.fillStyle = accent;
    for(let x=90;x<W-90;x+=18){ ctx.beginPath(); ctx.arc(x,y,2.2,0,Math.PI*2); ctx.fill(); }
  }

  ctx.fillStyle = '#2E2A24';
  ctx.font = "600 44px 'Playfair Display'";
  ctx.fillText(state.settings.businessName || 'Bridal Makeup Studio', 80, 150);
  if(state.settings.artistName){ ctx.font = "400 18px 'Inter'"; ctx.fillStyle = '#948A79'; ctx.fillText(state.settings.artistName, 80, 182); }
  ctx.font = "500 14px 'Inter'"; ctx.fillStyle = accent; ctx.textAlign = 'right'; ctx.fillText('INVOICE', W-80, 100);
  ctx.font = "400 14px 'IBM Plex Mono'"; ctx.fillStyle = '#948A79';
  ctx.fillText('No. ' + job.id.slice(-6).toUpperCase(), W-80, 122);
  ctx.fillText(formatDate(new Date().toISOString().slice(0,10)), W-80, 144);
  ctx.textAlign = 'left';

  drawScallop(210);
  let y = 260;
  ctx.font = "600 13px 'Inter'"; ctx.fillStyle = '#948A79';
  ctx.fillText('CLIENT', 80, y); ctx.fillText('EVENT DATE', 420, y); ctx.fillText('LOCATION', 680, y);
  y += 28;
  ctx.font = "500 20px 'Playfair Display'"; ctx.fillStyle = '#2E2A24';
  ctx.fillText((job.clientName || '-').toUpperCase(), 80, y);
  ctx.fillText(job.date ? formatDate(job.date) : '-', 420, y);
  ctx.font = "500 16px 'Inter'";
  wrapText(ctx, job.locale || '-', 680, y-4, 240, 20);

  y += 60; drawScallop(y); y += 50;
  ctx.font = "600 13px 'Inter'"; ctx.fillStyle = '#948A79';
  ctx.fillText('SERVICE', 80, y); ctx.textAlign = 'right'; ctx.fillText('AMOUNT', W-80, y); ctx.textAlign = 'left';
  y += 22; ctx.strokeStyle = '#E7DFD0'; ctx.beginPath(); ctx.moveTo(80,y); ctx.lineTo(W-80,y); ctx.stroke(); y += 32;

  const lines = [...(job.services||[]).map(s=>({name:(s.name||'').toUpperCase(), price:(Number(s.unitCost)||0)*(Number(s.qty)||1)}))];
  if(Number(job.travelCost)>0) lines.push({name:'TRAVEL', price:job.travelCost});
  if(Number(job.accommodationCost)>0) lines.push({name:'ACCOMMODATION', price:job.accommodationCost});
  lines.forEach(ln=>{
    ctx.font = "400 17px 'Inter'"; ctx.fillStyle = '#2E2A24'; ctx.fillText(ln.name, 80, y);
    ctx.font = "400 17px 'IBM Plex Mono'"; ctx.textAlign = 'right'; ctx.fillText(money(ln.price, sym), W-80, y); ctx.textAlign = 'left';
    y += 34;
  });

  y += 10; ctx.strokeStyle = '#E7DFD0'; ctx.beginPath(); ctx.moveTo(80,y); ctx.lineTo(W-80,y); ctx.stroke(); y += 44;

  const total = jobTotal(job), dep = jobDeposit(job), bal = jobBalance(job);
  function totalsRow(label, val, opts){
    opts = opts || {};
    ctx.font = opts.bold ? "700 19px 'Inter'" : "400 17px 'Inter'";
    ctx.fillStyle = opts.color || '#2E2A24';
    ctx.fillText(label, 560, y);
    ctx.font = opts.bold ? "700 19px 'IBM Plex Mono'" : "400 17px 'IBM Plex Mono'";
    ctx.textAlign = 'right'; ctx.fillText(money(val, sym), W-80, y); ctx.textAlign = 'left';
    y += 36;
  }
  totalsRow('Subtotal', total);
  totalsRow(job.depositType==='full' ? 'Paid in Full' : ('Deposit ' + (job.depositPaid?'(received)':'(due)')), dep, {color: job.depositPaid ? '#7C8B6F' : '#2E2A24'});
  if(job.depositType!=='full') totalsRow('Balance Due', bal, {bold:true, color: job.balancePaid ? '#7C8B6F' : '#B4635C'});

  y = H - 180; drawScallop(y); y += 40;
  ctx.font = "italic 500 16px 'Playfair Display'"; ctx.fillStyle = accent;
  ctx.fillText('With love & gratitude for being part of your day.', 80, y);
  if(state.settings.paymentDetails){ y += 34; ctx.font = "400 13px 'Inter'"; ctx.fillStyle = '#948A79'; wrapText(ctx, state.settings.paymentDetails, 80, y, W-160, 18); }

  const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = invoiceFilename(job);
  a.click();
}

// ---------- export CSV ----------
function exportCsv(){
  const rows = [['Date','Type','Client/Item','Location/Notes','Service Details','Payment Type','Amount']];
  state.jobs.filter(j=>!j.trashed).forEach(j=>{
    const svcDetail = (j.services||[]).map(s=>`${s.name}:${s.unitCost}x${s.qty||1}`).join(' | ');
    if(j.depositPaid){
      rows.push([j.depositPaidDate || j.date, 'Income', j.clientName||'', j.locale||'', svcDetail, j.depositType==='full'?'Full Payment':'Deposit', jobDeposit(j).toFixed(2)]);
    }
    if(j.depositType!=='full' && j.balancePaid){
      rows.push([j.balancePaidDate || j.date, 'Income', j.clientName||'', j.locale||'', svcDetail, 'Balance', jobBalance(j).toFixed(2)]);
    }
    if(!j.depositPaid && !(j.depositType!=='full' && j.balancePaid)){
      rows.push([j.date, 'Income (Unpaid)', j.clientName||'', j.locale||'', svcDetail, 'Full Job Total', jobTotal(j).toFixed(2)]);
    }
  });
  state.expenses.forEach(e=>{
    rows.push([e.date,'Expense',e.category||'',e.description||'','', '', (Number(e.amount)||0).toFixed(2)]);
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `income_expense_${state.year}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ---------- event binding per tab ----------
function bindTabEvents(){
  if(state.tab==='dashboard'){
    const ys = document.getElementById('yearSel');
    if(ys) ys.onchange = ()=>{ state.year = Number(ys.value); render(); };
  }
  if(state.tab==='jobs'){
    const sortSel = document.getElementById('jobSortSel');
    if(sortSel) sortSel.onchange = ()=>{ state.jobSortBy = sortSel.value; render(); };
    const trashBtn = document.getElementById('openTrashBtn');
    if(trashBtn) trashBtn.onclick = openTrashModal;
    const addBtn = document.getElementById('addJobBtn');
    if(addBtn) addBtn.onclick = ()=> openJobModal(null);
    document.querySelectorAll('[data-action="edit-job"]').forEach(b=> b.onclick = ()=> openJobModal(state.jobs.find(j=>j.id===b.dataset.id)));
    document.querySelectorAll('[data-action="del-job"]').forEach(b=> b.onclick = ()=>{ const j = state.jobs.find(x=>x.id===b.dataset.id); if(j) openDeleteConfirm(j); });
    document.querySelectorAll('[data-action="toggle-dep"]').forEach(b=> b.onclick = ()=>{ const j = state.jobs.find(x=>x.id===b.dataset.id); j.depositPaid = !j.depositPaid; j.depositPaidDate = j.depositPaid ? (j.depositPaidDate || new Date().toISOString().slice(0,10)) : ''; persistJobs(); render(); });
    document.querySelectorAll('[data-action="toggle-bal"]').forEach(b=> b.onclick = ()=>{ const j = state.jobs.find(x=>x.id===b.dataset.id); j.balancePaid = !j.balancePaid; j.balancePaidDate = j.balancePaid ? (j.balancePaidDate || new Date().toISOString().slice(0,10)) : ''; persistJobs(); render(); });
    document.querySelectorAll('[data-action="invoice"]').forEach(b=> b.onclick = ()=>{ state.invoiceJobId = b.dataset.id; state.tab='invoice'; render(); });
  }
  if(state.tab==='expenses'){
    const addBtn = document.getElementById('addExpBtn');
    if(addBtn) addBtn.onclick = ()=> openExpModal(null);
    document.querySelectorAll('[data-action="edit-exp"]').forEach(b=> b.onclick = ()=> openExpModal(state.expenses.find(e=>e.id===b.dataset.id)));
    document.querySelectorAll('[data-action="del-exp"]').forEach(b=> b.onclick = ()=>{ state.expenses = state.expenses.filter(e=>e.id!==b.dataset.id); persistExpenses(); render(); });
  }
  if(state.tab==='invoice'){
    const sel = document.getElementById('invJobSel');
    if(sel) sel.onchange = ()=>{ state.invoiceJobId = sel.value; render(); };
    const tcSel = document.getElementById('invTcSel');
    if(tcSel) tcSel.onchange = ()=>{
      const job = state.jobs.find(j=>j.id===state.invoiceJobId);
      if(job){ job.tcTemplateId = tcSel.value; persistJobs(); }
    };
    const genBtn = document.getElementById('genInvBtn');
    if(genBtn) genBtn.onclick = ()=>{
      const job = state.jobs.find(j=>j.id===state.invoiceJobId);
      if(job) generateInvoice(job);
    };
  }
  if(state.tab==='settings'){
    const appBtn = document.getElementById('saveAppearanceBtn');
    if(appBtn) appBtn.onclick = ()=>{
      state.settings.appTitle = document.getElementById('setAppTitle').value.trim() || 'Invoice Manager';
      state.settings.headingFont = document.getElementById('setHeadingFont').value;
      state.settings.bodyFont = document.getElementById('setBodyFont').value;
      state.settings.themeColor = document.getElementById('setThemeColor').value;
      state.settings.bgColor = document.getElementById('setBgColor').value;
      state.settings.surfaceColor = document.getElementById('setSurfaceColor').value;
      state.settings.uiTextColor = document.getElementById('setUiTextColor').value;
      const ok = persistSettings();
      showErr(ok===false ? 'Save failed, please try again' : '');
      render();
    };
    document.querySelectorAll('[data-preset]').forEach(b=> b.onclick = ()=>{
      const p = THEME_PRESETS[Number(b.dataset.preset)];
      if(!p) return;
      state.settings.bgColor = p.bg;
      state.settings.surfaceColor = p.surface;
      state.settings.uiTextColor = p.text;
      state.settings.themeColor = p.accent;
      persistSettings();
      render();
    });
    document.getElementById('saveSetBtn').onclick = ()=>{
      state.settings.businessName = document.getElementById('setBiz').value;
      state.settings.artistName = document.getElementById('setArtist').value;
      state.settings.currencySymbol = document.getElementById('setSym').value;
      state.settings.accentHex = document.getElementById('setAccent').value;
      state.settings.paymentDetails = document.getElementById('setPay').value;
      state.settings.invoiceFontFamily = document.getElementById('setFontFamily').value;
      const ok = persistSettings();
      showErr(ok===false ? 'Save failed, please try again' : '');
      render();
    };
    document.getElementById('exportBtn').onclick = exportCsv;
    const bgUpload = document.getElementById('bgUpload');
    if(bgUpload) bgUpload.onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        state.settings.invoiceBg = reader.result;
        const ok = persistInvoiceBg();
        scheduleDriveSave();
        showErr(ok===false ? 'Image save failed (file may be too large) — please try a smaller image' : '');
        render();
      };
      reader.readAsDataURL(file);
    };
    const calBtn = document.getElementById('calibrateBtn');
    if(calBtn) calBtn.onclick = openCalibrationModal;
    const rmBtn = document.getElementById('removeBgBtn');
    if(rmBtn) rmBtn.onclick = ()=>{ state.settings.invoiceBg = null; persistInvoiceBg(); scheduleDriveSave(); render(); };
    const gBtn = document.getElementById('saveGClientBtn');
    if(gBtn) gBtn.onclick = ()=>{
      state.settings.googleClientId = document.getElementById('setGClientId').value.trim();
      gTokenClient = null; // reset so new client id takes effect
      const ok = persistSettings();
      showErr(ok===false ? 'Save failed, please try again' : '');
      render();
    };
    const addTcBtn = document.getElementById('addTcBtn');
    if(addTcBtn) addTcBtn.onclick = ()=> openTcModal(null);
    document.querySelectorAll('[data-action="edit-tc"]').forEach(b=> b.onclick = ()=> openTcModal((state.settings.tcTemplates||[]).find(t=>t.id===b.dataset.id)));
    document.querySelectorAll('[data-action="del-tc"]').forEach(b=> b.onclick = ()=>{
      state.settings.tcTemplates = (state.settings.tcTemplates||[]).filter(t=>t.id!==b.dataset.id);
      persistSettings(); render();
    });
  }
}

render();
attemptSilentGoogleSignIn();
